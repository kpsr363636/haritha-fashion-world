spring:
  jpa:
    show-sql: true
  devtools:
    restart:
      enabled: true

logging:
  level:
    com.harithafashion: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG

app:
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173
  upload:
    local-enabled: true
    local-dir: ../frontend/public/uploads
    local-base-url: http://localhost:5173/uploads
  delivery:
    charge: 1
    free-threshold: 999999

razorpay:
  key-id: ${RAZORPAY_KEY_ID:}
  key-secret: ${RAZORPAY_KEY_SECRET:}
  webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:}
