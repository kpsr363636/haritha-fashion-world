name: Frontend Deploy
on:
  push:
    branches: [main]
    paths: ['frontend/**']

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || '/api' }}
          VITE_RAZORPAY_KEY_ID: ${{ secrets.VITE_RAZORPAY_KEY_ID }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
        run: |
          npm ci
          npm run build
      - name: Configure AWS credentials
        if: vars.AWS_DEPLOY_ENABLED == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'ap-south-1' }}
      - name: Deploy frontend to S3 + CloudFront
        if: vars.AWS_DEPLOY_ENABLED == 'true'
        env:
          S3_BUCKET: ${{ vars.FRONTEND_S3_BUCKET }}
          CLOUDFRONT_DIST_ID: ${{ vars.CLOUDFRONT_DIST_ID }}
        run: |
          aws s3 sync frontend/dist "s3://$S3_BUCKET" --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" --exclude "*.json"
          aws s3 sync frontend/dist "s3://$S3_BUCKET" \
            --cache-control "public, max-age=0, must-revalidate" \
            --include "index.html" --include "*.json"
          aws cloudfront create-invalidation --distribution-id "$CLOUDFRONT_DIST_ID" --paths "/*"
      - name: Upload artifact
        if: vars.AWS_DEPLOY_ENABLED != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: haritha-fashion-frontend
          path: frontend/dist
